version: '3.8'

services:
  postgres:
    image: postgres:17-alpine
    container_name: endocrine_survey_db
    environment:
      POSTGRES_USER: endocrine_user
      POSTGRES_PASSWORD: secure_password_change_me
      POSTGRES_DB: endocrine_survey
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U endocrine_user -d endocrine_survey"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - endocrine_network

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: endocrine_survey_app
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://endocrine_user:secure_password_change_me@postgres:5432/endocrine_survey
      VITE_APP_TITLE: EndocriCheck - Pesquisa Endocrinológica
      JWT_SECRET: your_jwt_secret_here
      OAUTH_SERVER_URL: https://api.manus.im
      VITE_OAUTH_PORTAL_URL: https://manus.im
      VITE_APP_ID: your_app_id_here
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - endocrine_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  postgres_data:
    driver: local

networks:
  endocrine_network:
    driver: bridge
